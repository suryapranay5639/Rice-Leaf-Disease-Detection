<!DOCTYPE html>
<html>

<head>
    <title>Scan History - Rice Health Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background-color: #27ae60;
            color: white;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .history-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
        }

        .healthy {
            background: #d4edda;
            color: #155724;
        }

        .diseased {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/">Scanner</a>
        <a href="/history">History</a>
        <a href="/encyclopedia">Encyclopedia</a>
        <a href="/contact">Contact</a>
    </nav>

    <div class="container" style="max-width: 1000px; margin-top: 40px;">
        <h1>Diagnosis History / గత చరిత్ర</h1>
        <p>Review and download reports of all previous rice leaf analyses.</p>

        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Diagnosis</th>
                    <th>Confidence</th>
                    <th>Date & Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for scan in scans %}
                <tr>
                    <td><img src="{{ url_for('static', filename=scan[0]) }}" class="history-img"></td>
                    <td>
                        <span class="status-badge {{ 'healthy' if 'Healthy' in scan[1] else 'diseased' }}">
                            {{ scan[1] }}
                        </span>
                    </td>
                    <td><strong>{{ scan[2] }}%</strong></td>
                    <td style="font-size: 0.9em; color: #666;">{{ scan[3] }}</td>
                    <td>
                        <a href="{{ url_for('download_report', prediction=scan[1], confidence=scan[2]) }}" class="btn"
                            style="padding: 6px 12px; font-size: 0.8em; background: #2980b9;">
                            Download PDF
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
